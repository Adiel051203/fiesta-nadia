<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fiesta 50 Nadia</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
overflow-x:hidden;
background:
linear-gradient(
180deg,
#12001d,
#240046,
#3c096c,
#10002b
);
color:white;
min-height:100vh;
position:relative;
}

/* FONDO RETRO */

.background{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:-2;
}

.sun{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
width:300px;
height:300px;
border-radius:50%;
background:
linear-gradient(
to bottom,
#ff4d6d,
#ff758f,
#ffb3c1
);
box-shadow:
0 0 60px #ff4d6d,
0 0 100px #ff758f;
}

.grid{
position:absolute;
bottom:0;
width:100%;
height:50%;
background:
linear-gradient(
transparent 0%,
rgba(255,255,255,.15) 100%
);
clip-path:
polygon(0 100%,100% 100%,100% 0,0 0);
}

.grid::before{
content:'';
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(
90deg,
rgba(255,255,255,.15) 1px,
transparent 1px
),
linear-gradient(
rgba(255,255,255,.15) 1px,
transparent 1px
);
background-size:50px 50px;
transform:
perspective(500px)
rotateX(70deg);
transform-origin:bottom;
}

/* OBJETOS RETRO */

.retro{
position:absolute;
font-size:40px;
animation:
float 5s ease-in-out infinite;
opacity:.8;
}

.r1{
top:10%;
left:10%;
}

.r2{
top:18%;
right:12%;
}

.r3{
top:40%;
left:5%;
}

.r4{
top:50%;
right:8%;
}

.r5{
bottom:20%;
left:15%;
}

.r6{
bottom:15%;
right:15%;
}

@keyframes float{
0%,100%{
transform:
translateY(0);
}
50%{
transform:
translateY(-15px);
}
}

/* INTRO */

#intro{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.intro-card{
backdrop-filter:blur(20px);
background:
rgba(255,255,255,.1);
border:
1px solid rgba(255,255,255,.2);
padding:40px;
border-radius:30px;
box-shadow:
0 0 30px rgba(255,0,255,.3);
max-width:500px;
width:100%;
}

.title{
font-family:'Orbitron',sans-serif;
font-size:2rem;
color:#fff;
text-shadow:
0 0 10px #ff00ff,
0 0 30px #00f5ff;
margin-bottom:15px;
}

.golden50{
font-size:5rem;
font-weight:bold;
background:
linear-gradient(
45deg,
gold,
#ffe066,
#ffd43b
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:
0 0 30px rgba(255,215,0,.5);
margin-bottom:20px;
}

.subtitle{
font-size:1rem;
opacity:.9;
margin-bottom:30px;
}

.enter-btn{
border:none;
padding:18px 35px;
border-radius:20px;
font-size:1rem;
cursor:pointer;
background:
linear-gradient(
45deg,
#ff00ff,
#00e5ff
);
color:white;
font-weight:bold;
box-shadow:
0 0 25px rgba(255,0,255,.5);
transition:.3s;
}

.enter-btn:hover{
transform:scale(1.05);
}

/* CONTENIDO */

#contenido{
display:none;
padding:30px;
text-align:center;
}

.card{
max-width:800px;
margin:auto;
backdrop-filter:blur(20px);
background:
rgba(255,255,255,.1);
border-radius:30px;
padding:30px;
box-shadow:
0 0 40px rgba(255,255,255,.1);
border:
1px solid rgba(255,255,255,.2);
}

.main-title{
font-size:2rem;
font-family:'Orbitron',sans-serif;
margin-bottom:20px;
}

#countdown{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin:30px 0;
}

.time-box{
background:
rgba(255,255,255,.15);
padding:20px;
border-radius:20px;
min-width:100px;
box-shadow:
0 0 20px rgba(255,255,255,.1);
}

.time-number{
font-size:2rem;
font-weight:bold;
}

.location-btn,
.confirm-btn{
display:inline-block;
margin-top:15px;
padding:15px 30px;
border-radius:20px;
text-decoration:none;
border:none;
cursor:pointer;
font-size:1rem;
font-weight:bold;
color:white;
background:
linear-gradient(
45deg,
#ff00ff,
#00e5ff
);
box-shadow:
0 0 20px rgba(255,0,255,.4);
}

#qrContainer{
display:none;
margin-top:30px;
}

#qrImage{
width:250px;
border-radius:20px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="background">

<div class="sun"></div>
<div class="grid"></div>

<div class="retro r1">📻</div>
<div class="retro r2">☎️</div>
<div class="retro r3">📼</div>
<div class="retro r4">🧩</div>
<div class="retro r5">💿</div>
<div class="retro r6">🎧</div>

</div>

<div id="intro">

<div class="intro-card">

<div class="title">
✨ Ven a festejar conmigo ✨ 
</div>

<div class="golden50">
50
</div>

<p class="subtitle">
Una noche inolvidable
80s & 90s
</p>

<button
class="enter-btn"
id="enterBtn">

▶ Entrar a la experiencia

</button>

</div>

</div>
<div id="contenido">

<div class="card">

<h1 class="main-title">
✨ Te invito a celebrar conmigo mis 50 años ✨
</h1>

<h2 style="
font-size:3rem;
margin-bottom:20px;
font-family:'Orbitron';
background:linear-gradient(
45deg,
gold,
#ffe066
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
">
Nadia
</h2>

<p style="
margin-bottom:20px;
font-size:1.2rem;
">
📅 15 Agosto 2026 — 🕖 7:00 PM
</p>

<h2>
⏳ Falta para la gran fiesta
</h2>

<div id="countdown"></div>

<br>

<a
class="location-btn"
href="https://maps.app.goo.gl/HiwRRxf6YJnE4Y8E7"
target="_blank">

📍 Lugar del festejo

</a>

<br><br>

<button
class="confirm-btn"
id="confirmarBtn">

✨ Confirmar asistencia

</button>

<p
id="mesaTexto"
style="
margin-top:20px;
font-size:1.2rem;
font-weight:bold;
">
</p>

<div id="qrContainer">

<h2>
🎟 Tu acceso VIP
</h2>

<img
id="qrImage"
src="">

</div>

</div>

</div>


<script>

// ====================
// MUSICA
// ====================

const musica =
new Audio(
'./music/cancion.mp3'
);

musica.volume = 0.25;

document
.getElementById(
'enterBtn'
)
.addEventListener(
'click',
()=>{

document
.getElementById(
'intro'
)
.style.display =
'none';

document
.getElementById(
'contenido'
)
.style.display =
'block';

musica.play();

window.scrollTo({
top:0,
behavior:'smooth'
});

}
);


// ====================
// CONTADOR
// ====================

const eventDate =
new Date(
'2026-08-15T19:00:00'
);

function updateCountdown(){

const now =
new Date();

const diff =
eventDate - now;

if(diff <= 0){

document
.getElementById(
'countdown'
)
.innerHTML =
'<h2>🎉 ¡La fiesta comenzó! 🎉</h2>';

return;
}

const months =
Math.floor(
diff /
(1000*60*60*24*30)
);

const days =
Math.floor(
(diff %
(1000*60*60*24*30))
/
(1000*60*60*24)
);

const hours =
Math.floor(
(diff %
(1000*60*60*24))
/
(1000*60*60)
);

const minutes =
Math.floor(
(diff %
(1000*60*60))
/
(1000*60)
);

document
.getElementById(
'countdown'
)
.innerHTML =
`

<div class="time-box">
<div class="time-number">
${months}
</div>
Meses
</div>

<div class="time-box">
<div class="time-number">
${days}
</div>
Días
</div>

<div class="time-box">
<div class="time-number">
${hours}
</div>
Horas
</div>

<div class="time-box">
<div class="time-number">
${minutes}
</div>
Minutos
</div>

`;

}

updateCountdown();

setInterval(
updateCountdown,
1000
);


// ====================
// CONFIRMAR
// ====================

document
.getElementById(
'confirmarBtn'
)
.addEventListener(
'click',
async ()=>{

const nombre =
prompt(
'Escribe tu nombre tal como aparece en tu invitación'
);

if(!nombre) return;

const params =
new URLSearchParams(
window.location.search
);

const id =
params.get('id');

try{

const response =
await fetch(
'https://fiesta-nadia.onrender.com/confirmar',
{
method:'POST',
headers:{
'Content-Type':
'application/json'
},
body:JSON.stringify({
id,
nombre
})
}
);

const data =
await response.json();

if(data.error){

alert(data.error);
return;
}

document
.getElementById(
'mesaTexto'
)
.innerHTML =
'🪑 Mesa asignada: ' +
data.mesa;

document
.getElementById(
'qrContainer'
)
.style.display =
'block';

document
.getElementById(
'qrImage'
)
.src =
data.qr;

window.scrollTo({
top:document.body.scrollHeight,
behavior:'smooth'
});

}catch(error){

alert(
'Error al confirmar asistencia'
);

}

});

</script>

</body>
</html>
