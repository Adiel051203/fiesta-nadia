<!DOCTYPE html>
<html>
<head>
  <title>Invitación</title>
</head>
<body style="text-align:center; font-family: Arial;">

  <h1>🎉 Fiesta 50 de Nadia 🎉</h1>
  <h2 id="mesa"></h2>

  <div id="invitados"></div>

  <button onclick="confirmar()">Confirmar asistencia</button>

  <div id="qr"></div>

<script>
async function cargar() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  const res = await fetch(`/invitacion?id=${id}`);
  const data = await res.json();

  document.getElementById("mesa").innerText = "Mesa " + data.mesa;

  let html = "";
  data.invitados.forEach(i => {
    html += `<p>${i.nombre} ${i.confirmado ? "✔" : ""}</p>`;
  });

  document.getElementById("invitados").innerHTML = html;
}

async function confirmar() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  const nombre = prompt("Escribe tu nombre EXACTO:");

  const res = await fetch("/confirmar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id, nombre })
  });

  const data = await res.json();

  if (data.qr) {
    document.getElementById("qr").innerHTML = `
      <h3>Tu código QR:</h3>
      <img src="${data.qr}" width="200"/>
    `;
  } else {
    alert(data.error);
  }
}

cargar();
</script>

</body>
</html>
