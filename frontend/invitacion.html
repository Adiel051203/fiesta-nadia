<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Fiesta 50 Nadia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    background:#090014;
    color:white;
    min-height:100vh;
}

/* FONDO 80s */

body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top,#ff00ff33 0%,transparent 30%),
    radial-gradient(circle at bottom,#00e5ff33 0%,transparent 30%),
    linear-gradient(to bottom,#130022,#05010d);
    z-index:-5;
}

.grid{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:35vh;
    background:
    linear-gradient(#ff00ff22 1px,transparent 1px),
    linear-gradient(90deg,#00e5ff22 1px,transparent 1px);
    background-size:40px 40px;
    transform:
    perspective(500px)
    rotateX(75deg);
    transform-origin:bottom;
    z-index:-2;
}

/* ESTRELLAS */

.stars{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-3;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{
        opacity:.2;
    }
    50%{
        opacity:1;
    }
}

/* INTRO */

.intro{
    position:fixed;
    width:100%;
    height:100%;
    background:#07000f;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    animation:fadeOut 2s ease forwards;
    animation-delay:2.2s;
}

.intro h1{
    font-family:'Orbitron',sans-serif;
    font-size:2rem;
    text-align:center;
    color:#ff00ff;
    text-shadow:
    0 0 10px #ff00ff,
    0 0 25px #00e5ff;
}

@keyframes fadeOut{
    to{
        opacity:0;
        visibility:hidden;
    }
}
/* CONTENEDOR */

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    position:relative;
    width:100%;
    max-width:430px;
    border-radius:30px;
    padding:35px 28px;
    text-align:center;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:
    0 0 25px rgba(255,0,255,.25),
    0 0 45px rgba(0,229,255,.12);

    animation:floatCard 5s ease-in-out infinite;
}

@keyframes floatCard{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-8px);
    }
}

/* DECORACIONES */

.decor{
    position:absolute;
    opacity:.15;
}

.cassette{
    top:15px;
    left:20px;
    font-size:2rem;
}

.disco{
    top:20px;
    right:20px;
    font-size:2rem;
}

.palmera{
    bottom:18px;
    left:20px;
    font-size:2rem;
}

.star-deco{
    bottom:18px;
    right:20px;
    font-size:2rem;
}

/* TITULOS */

h1{
    font-family:'Orbitron',sans-serif;
    font-size:2rem;
    line-height:1.3;
    margin-bottom:12px;

    color:#fff;

    text-shadow:
    0 0 8px #ff00ff,
    0 0 18px #00e5ff;
}

.subtitulo{
    color:#ffd700;
    font-size:1rem;
    margin-bottom:20px;
    letter-spacing:1px;
}

.fecha{
    margin:20px 0;
    font-size:1rem;
    color:#d7d7d7;
}

/* CONTADOR */

.countdown{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
    margin:25px 0;
}

.time-box{
    padding:18px;
    border-radius:22px;

    background:rgba(255,255,255,.07);

    border:1px solid rgba(255,255,255,.12);

    box-shadow:
    0 0 12px rgba(255,0,255,.2);
}

.time-number{
    font-size:1.8rem;
    font-weight:bold;
    color:#00e5ff;
    font-family:'Orbitron';
}

.time-label{
    color:#ddd;
    margin-top:5px;
}

/* BOTONES */

.btn{
    border:none;
    padding:16px;
    width:100%;
    border-radius:18px;
    font-size:1rem;
    cursor:pointer;
    transition:.3s;
    margin-top:15px;
    font-weight:600;
}

.confirm-btn{
    background:
    linear-gradient(45deg,#ff00ff,#00e5ff);
    color:white;

    box-shadow:
    0 0 20px rgba(255,0,255,.35);
}

.confirm-btn:hover{
    transform:scale(1.03);
}

.music-btn{
    background:transparent;
    border:1px solid #ff00ff;
    color:#ff9eff;
}

/* QR */

.qr-container{
    display:none;
    margin-top:25px;
}

.qr-card{
    background:rgba(255,255,255,.08);
    border-radius:22px;
    padding:20px;
    border:1px solid rgba(255,255,255,.1);
}

.qr-title{
    color:#ffd700;
    margin-bottom:10px;
}

/* INPUT */

input{
    width:100%;
    padding:14px;
    border-radius:15px;
    border:none;
    outline:none;
    margin-top:12px;
    text-align:center;
    font-size:1rem;
}

/* RESPONSIVE */

@media(max-width:480px){

    h1{
        font-size:1.6rem;
    }

    .card{
        padding:28px 20px;
    }

    .countdown{
        gap:10px;
    }

}
</style>
</head>

<body>

<div class="intro">
    <h1>
        ✨ Bienvenido a la<br>
        Fiesta 50 de Nadia ✨
    </h1>
</div>

<div class="stars" id="stars"></div>
<div class="grid"></div>

<div class="container">

<div class="card">

<div class="decor cassette">📼</div>
<div class="decor disco">💿</div>
<div class="decor palmera">🌴</div>
<div class="decor star-deco">✨</div>

<h1>
✨ Fiesta de Cumpleaños 50 de Nadia ✨
</h1>

<p class="subtitulo">
80s & 90s Retro Party
</p>

<p class="fecha">
📅 22 Agosto 2026 — 🕖 7:00 PM
</p>

<div class="countdown" id="countdown"></div>

<button class="btn music-btn" id="musicBtn">
🎵 Activar música retro
</button>

<button class="btn confirm-btn" id="confirmarBtn">
✨ Confirmar asistencia
</button>

<div class="qr-container" id="qrContainer">

<div class="qr-card">

<h3 class="qr-title">
🎟 TU ACCESO VIP
</h3>

<p id="mesaTexto"></p>

<img id="qrImage"
style="width:220px;margin-top:15px;border-radius:15px;">

</div>
</div>

</div>
</div>
<script>

// ==========================
// ESTRELLAS ANIMADAS
// ==========================

const starsContainer = document.getElementById('stars');

for(let i=0;i<120;i++){

    const star = document.createElement('div');
    star.classList.add('star');

    star.style.left = Math.random()*100+'%';
    star.style.top = Math.random()*100+'%';

    star.style.animationDelay =
    Math.random()*4+'s';

    starsContainer.appendChild(star);
}


// ==========================
// CONTADOR 22 AGOSTO 2026
// 7:00 PM
// ==========================

const eventDate = new Date(
'2026-08-22T19:00:00'
);

function updateCountdown(){

    const now = new Date();

    const diff =
    eventDate - now;

    if(diff <= 0){

        document
        .getElementById('countdown')
        .innerHTML = `
        <div class="time-box">
            <div class="time-number">
                🎉
            </div>
            <div class="time-label">
                ¡La fiesta comenzó!
            </div>
        </div>
        `;

        return;
    }

    const totalMinutes =
    Math.floor(diff / 1000 / 60);

    const totalHours =
    Math.floor(totalMinutes / 60);

    const totalDays =
    Math.floor(totalHours / 24);

    const months =
    Math.floor(totalDays / 30);

    const days =
    totalDays % 30;

    const hours =
    totalHours % 24;

    const minutes =
    totalMinutes % 60;

    let html = '';

    // MESES
    if(months > 0){

        html += `
        <div class="time-box">
            <div class="time-number">
                ${months}
            </div>
            <div class="time-label">
                Meses
            </div>
        </div>
        `;
    }

    // DÍAS
    if(totalDays > 0){

        html += `
        <div class="time-box">
            <div class="time-number">
                ${days}
            </div>
            <div class="time-label">
                Días
            </div>
        </div>
        `;
    }

    // HORAS
    html += `
    <div class="time-box">
        <div class="time-number">
            ${hours}
        </div>
        <div class="time-label">
            Horas
        </div>
    </div>
    `;

    // MINUTOS
    html += `
    <div class="time-box">
        <div class="time-number">
            ${minutes}
        </div>
        <div class="time-label">
            Minutos
        </div>
    </div>
    `;

    document
    .getElementById('countdown')
    .innerHTML = html;
}

updateCountdown();

setInterval(
updateCountdown,
1000
);


// ==========================
// BOTÓN MÚSICA
// ==========================

const audio = new Audio(
'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'
);

audio.loop = true;

const musicBtn =
document.getElementById(
'musicBtn'
);

let playing = false;

musicBtn
.addEventListener(
'click',
()=>{

if(!playing){

    audio.play();

    musicBtn.innerHTML =
    '⏸ Pausar música';

    playing = true;

}else{

    audio.pause();

    musicBtn.innerHTML =
    '🎵 Activar música retro';

    playing = false;
}

});


// ==========================
// CONFIRMAR ASISTENCIA
// ==========================

document
.getElementById(
'confirmarBtn'
)
.addEventListener(
'click',
async ()=>{

const nombre =
prompt(
'Escribe tu nombre tal como aparece en tu invitación'
);

if(!nombre) return;


// OBTENER ID DEL LINK

const params =
new URLSearchParams(
window.location.search
);

const id =
params.get('id');


try{

const response =
await fetch(
'https://fiesta-nadia.onrender.com/confirmar',
{
method:'POST',
headers:{
'Content-Type':
'application/json'
},
body:JSON.stringify({
id,
nombre
})
}
);

const data =
await response.json();

if(data.error){

alert(data.error);
return;
}


// MOSTRAR QR

document
.getElementById(
'qrContainer'
)
.style.display =
'block';

document
.getElementById(
'qrImage'
)
.src = data.qr;


document
.getElementById(
'mesaTexto'
)
.innerHTML =
'✨ Tu acceso VIP está listo ✨';

window.scrollTo({
top:document.body.scrollHeight,
behavior:'smooth'
});

}catch(error){

alert(
'Error al confirmar asistencia'
);

}

});

</script>

</body>
</html>
